<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Clicker - Cosmic Mining Adventure</title>
    <link rel="stylesheet" href="/stellar-clicker/style.css">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2849247335999308"
     crossorigin="anonymous"></script>
    <!-- MongoDB Auth Module -->
    <script src="/stellar-clicker/auth.js"></script>
</head>
<body>
    <!-- Starry Background -->
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>

    <!-- Top Ad Banner -->
    <div class="ad-container ad-top">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-2849247335999308"
             data-ad-slot="XXXXXXXXXX"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>🚀 Welcome to Stellar Clicker</h2>
            <div id="login-form">
                <input type="email" id="email-input" placeholder="Email" required>
                <input type="password" id="password-input" placeholder="Password" required>
                <button id="login-btn" class="btn-primary">Login</button>
                <button id="signup-btn" class="btn-secondary">Sign Up</button>
                <p class="modal-footer">Or continue as <a href="#" id="guest-link">Guest</a></p>
            </div>
            <div id="user-info" style="display: none;">
                <p>Logged in as: <span id="user-email"></span></p>
                <button id="logout-btn" class="btn-secondary">Logout</button>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="header-top">
                <h1>🌟 Stellar Clicker</h1>
                <div class="header-actions">
                    <div class="online-count">
                        <span class="online-icon">🟢</span>
                        <span id="online-count">0</span> online
                    </div>
                    <button id="login-toggle" class="btn-icon">👤</button>
                    <button id="leaderboard-toggle" class="btn-icon">🏆</button>
                </div>
            </div>
            <div class="coin-display">
                <span class="coin-label">Stellar Coins:</span>
                <span id="coin-counter" class="coin-value">0</span>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Per Click:</span>
                    <span id="coins-per-click">1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Per Second:</span>
                    <span id="coins-per-second">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Total Mined:</span>
                    <span id="total-mined">0</span>
                </div>
            </div>
        </header>

        <main>
            <div class="click-section">
                <button id="click-button" class="click-button">
                    <span class="asteroid-icon">☄️</span>
                    <span class="click-text">Mine!</span>
                </button>
                <div id="click-effect" class="click-effect"></div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="upgrades">🚀 Upgrades</button>
                <button class="tab-btn" data-tab="skills">⭐ Skill Tree</button>
                <button class="tab-btn" data-tab="achievements">🏅 Achievements</button>
            </div>

            <div class="tab-content active" id="upgrades-tab">
                <div id="upgrades-list" class="upgrades-list">
                    <!-- Upgrades will be generated by JavaScript -->
                </div>
            </div>

            <div class="tab-content" id="skills-tab">
                <div id="skill-tree" class="skill-tree">
                    <!-- Skill tree will be generated by JavaScript -->
                </div>
            </div>

            <div class="tab-content" id="achievements-tab">
                <div id="achievements-list" class="achievements-list">
                    <!-- Achievements will be generated by JavaScript -->
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <p>&copy; 2024 Ander507 Inc. All rights reserved.</p>
                <a href="https://ko-fi.com/ander507" target="_blank" class="kofi-btn">☕ Support me on Ko-fi</a>
            </div>
        </footer>
    </div>

    <!-- Leaderboard Modal -->
    <div id="leaderboard-modal" class="modal">
        <div class="modal-content modal-large">
            <span class="close-modal">&times;</span>
            <h2>🏆 Galactic Leaderboard</h2>
            <div id="leaderboard-list" class="leaderboard-list">
                <!-- Leaderboard will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Bottom Ad Banner -->
    <div class="ad-container ad-bottom">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-2849247335999308"
             data-ad-slot="XXXXXXXXXX"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <script src="/stellar-clicker/script.js"></script>
</body>
</html>
